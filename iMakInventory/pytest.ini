[pytest]
markers =
    offline: scraper detection tests using saved HTML samples (no network, fast).
             Used for cycle precheck (run_cycle.py の Phase 7a) — DOM 仕様変更を
             cycle 開始前に検知して fail-closed で巡回停止する。
    live: tests hitting live URLs (network required, slow).
          通常 CI で skip、運用前 manual smoke で実行。
