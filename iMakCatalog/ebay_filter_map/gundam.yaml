# Gundam Card Game — eBay フィルタ値マッピング
#
# 出典: 2026-04-27 --full scrape 完走後の実 DB 値から確定
#
# 注意:
#   - source_value は scraper が DB に書く値と完全一致させる
#   - 新弾追加時は本ファイルに 1 行足して `python ebay_filter_map/loader.py gundam` で再ロード

category: gundam_tcg

# ============================================================================
# Set (公式原文ベタ一致)
# ============================================================================
set:
  # Promo / Misc ラベル
  - source: Promotion Card
    ebay: Promo Cards
    note: REVIEW eBay 値
  - source: プロモーションカード
    ebay: Promo Cards
    note: JA 'Promotion Card'
  - source: リミテッドBOX Ver.β
    ebay: Limited Box Beta Ver.
    note: JA-only Limited Box β — REVIEW eBay 値
  - source: Edition Beta
    ebay: Edition Beta
    note: REVIEW eBay 値

