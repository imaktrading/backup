# Pokemon TCG (Japanese) — eBay フィルタ値マッピング
#
# 出典: 2026-04-28 --full scrape 完走後の実 DB から取得 (21899 rows / 182 unique sets)
#       Top 50+ set_code を網羅、残りは新弾発売時に追記
#
# Pokemon set_code 命名規則:
#   - SV{n}{suffix?}        : Scarlet & Violet 系 (sv1~sv11W、複数 suffix あり)
#   - S{n}{suffix?}         : Sword & Shield 系 (s1~s12a)
#   - SM{n}{suffix?}        : Sun & Moon 系
#   - M{n}{suffix?}         : Mega 系 (M2a, M4 等)
#   - XY / DPt / BW / L     : 旧シリーズ
#   - その他 (MC/SI/SVM/SVD/SMH/SD/CP4) : プロモ・misc
#   - 大文字小文字混在: 公式 image_url='M2a'/PSA brand='M2A' → adapter 双方試行
#
# 注意:
#   - 新弾発売時は本ファイルに追記 + `python ebay_filter_map/loader.py pokemon`
#   - eBay 値は推測含む (REVIEW マーク)、定期的に eBay UI で確認

category: pokemon_tcg

