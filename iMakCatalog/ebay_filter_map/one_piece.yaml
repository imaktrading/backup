# One Piece Card Game — eBay フィルタ値マッピング
#
# 出典: iMakTCG/psa_to_csv.py の _ONEPIECE_SET_NAME_MAP / _onepiece_rarity_to_ebay
#       (2026-04-25 時点でユーザーが eBay フィルタ値を確認済み)
#
# 注意:
#   - source_value は scraper が DB に書く値と完全一致させる
#       set      : set_name_official (公式原文の booster 名そのもの)
#       set_code : 公式原文の角括弧内 (例: "OP-06") — set fallback として api._row_to_dict が抽出
#       rarity   : TCG+ API の card_config.Rarity short code (L/C/UC/R/SR/SEC/...)
#   - 新弾追加時は本ファイルに 1 行足して `python ebay_filter_map/loader.py one_piece` で再ロード
#   - eBay の C:Set フィルタ表示が変わっていないか半年に一度ぐらい目視確認

category: one_piece_tcg

# ============================================================================
# Set (公式原文ベタ一致) — bracket [XX-NN] 抽出が効かない汎用ラベル用
# ============================================================================
set:
  # Promo / Misc ラベル — どれも eBay では "Promo Cards" にまとめられる想定
  - source: Promotion Card
    ebay: Promo Cards
    note: REVIEW eBay 値
  - source: Other Product Card
    ebay: Promo Cards
    note: REVIEW eBay 値
  - source: プロモーションカード
    ebay: Promo Cards
    note: JA 'Promotion Card'
  - source: 限定商品収録カード
    ebay: Promo Cards
    note: JA 'Limited Product Card' — REVIEW eBay 値

  # Vision OCR 由来の長文セット名 (PSA カード上の印刷名、bracket [...] 抜き)
  # 旧 psa_to_csv._ONEPIECE_SET_NAME_MAP の Vision エントリから移植
  - source: PREMIUM BOOSTER -ONE PIECE CARD THE BEST-
    ebay: Premium Booster One Piece The Best
    note: Vision OCR (PRB-01)
  - source: PREMIUM BOOSTER -ONE PIECE CARD THE BEST- VOL.2
    ebay: Premium Booster Vol.2
    note: Vision OCR (PRB-02)
  - source: PREMIUM BOOSTER ONE PIECE CARD THE BEST
    ebay: Premium Booster One Piece The Best
    note: Vision OCR variant (PRB-01, no hyphens)
  - source: PREMIUM BOOSTER ONE PIECE CARD THE BEST VOL.2
    ebay: Premium Booster Vol.2
    note: Vision OCR variant (PRB-02, no hyphens)

