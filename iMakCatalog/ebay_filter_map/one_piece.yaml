# ============================================================================
# Rarity (TCG+ API の short code → eBay フィルタ表示値)
# 注: TCG+ API は既に eBay 短縮コード形式 (SR / C / UC 等) を返すので大半は identity 写像。
#     L (Leader) は card type なので rarity としては空欄。
# ============================================================================
rarity:
  - source: L
    ebay: ""
    note: Leader = card type, not rarity → eBay rarity 欄は空欄
  - source: C
    ebay: C
  - source: UC
    ebay: UC
  - source: R
    ebay: R
  - source: SR
    ebay: SR
  - source: SEC
    ebay: SEC
  - source: P
    ebay: Promo
    note: Bandai "P" = eBay "Promo"
  - source: TR
    ebay: TR
    note: Treasure Rare
  - source: Special
    ebay: SEC
    note: Bandai "Special" = eBay "SEC" (parallel/alt-art 系)
  - source: SP
    ebay: SEC
  - source: DON!!
    ebay: DON!!
