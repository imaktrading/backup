# Dragon Ball Super Card Game (Fusion World) — eBay フィルタ値マッピング
#
# 出典: 2026-04-27 --full scrape 完走後の実 DB 値から確定 (3805 rows / 30 sets)
#       (旧 psa_to_csv._DRAGONBALL_SET_NAME_MAP は弾名が古く誤りあり、上書き済)
#
# 注意:
#   - source_value は scraper が DB に書く値と完全一致させる
#   - 新弾追加時は本ファイルに 1 行足して `python ebay_filter_map/loader.py dragonball` で再ロード

category: dragonball_scg

# ============================================================================
# Set (公式原文ベタ一致)
# ============================================================================
set:
  # Promo / Misc ラベル
  - source: Promotion Cards
    ebay: Promo Cards
    note: REVIEW eBay 値
  - source: プロモーションカード
    ebay: Promo Cards
    note: JA 'Promotion Card'

  # JA 公式原文 (mojibake 文字列の正規化)
  - source: ブースターパック DUAL EVOLUTION [FB09]
    ebay: Dual Evolution
    year: 2026
  - source: ブースターパック 未知なる冒険[FB05]
    ebay: New Adventure
    note: REVIEW eBay 値
    year: 2025
  - source: ブースターパック 烈火の闘気【FB02】
    ebay: Blazing Aura
    year: 2024
  - source: ブースターパック 迫り高き戦闘力 [FB08]
    ebay: "Saiyan's Pride"
    note: REVIEW eBay 値
    year: 2025
  - source: ブースターパック 迫り来る強敵[FB06]
    ebay: Rivals Clash
    note: REVIEW eBay 値
    year: 2025

